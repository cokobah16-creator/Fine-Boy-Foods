name: Deploy Supabase Edge Function (find-retailers)

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/find-retailers/**"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      EDGE_FUNCTION_NAME: find-retailers
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy live AI search function
        run: |
          set -euo pipefail
          supabase functions deploy "$EDGE_FUNCTION_NAME" --project-ref "$SUPABASE_PROJECT_REF"
